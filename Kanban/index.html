<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cozy Train Game — Build Board</title>
  <style>
    :root {
      --bg: #f4efe6;
      --panel: #fbf8f2;
      --ink: #3f3a33;
      --muted: #8a8074;
      --line: #e4dccd;
      --backlog: #b9b0a1;
      --todo: #6c93c4;
      --progress: #d99a3c;
      --done: #5fa776;
      --overdue: #c2553f;
      --shadow: 0 1px 2px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.05);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      font-family: ui-rounded, "Segoe UI", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--ink);
      padding: 16px;
      -webkit-font-smoothing: antialiased;
    }
    header {
      display: flex; flex-wrap: wrap; align-items: baseline; gap: 8px 16px;
      margin-bottom: 14px;
    }
    h1 { font-size: 20px; margin: 0; }
    .sub { color: var(--muted); font-size: 13px; }
    .summary {
      margin-left: auto; display: flex; align-items: center; gap: 12px;
      font-size: 13px; color: var(--muted);
    }
    .bar {
      width: 160px; height: 8px; border-radius: 99px; background: var(--line);
      overflow: hidden;
    }
    .bar > span { display: block; height: 100%; background: var(--done); width: 0; transition: width .4s; }

    .board {
      display: grid;
      grid-template-columns: repeat(4, minmax(220px, 1fr));
      gap: 14px;
      align-items: start;
    }
    @media (max-width: 900px) { .board { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 560px) { .board { grid-template-columns: 1fr; } }

    .col {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px;
      box-shadow: var(--shadow);
    }
    .col h2 {
      font-size: 13px; text-transform: uppercase; letter-spacing: .06em;
      margin: 4px 6px 10px; display: flex; align-items: center; gap: 8px;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .count { margin-left: auto; color: var(--muted); font-weight: 600; }
    .col[data-col="backlog"] .dot { background: var(--backlog); }
    .col[data-col="todo"] .dot { background: var(--todo); }
    .col[data-col="in-progress"] .dot { background: var(--progress); }
    .col[data-col="done"] .dot { background: var(--done); }

    .card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 11px;
      padding: 9px 11px;
      margin-bottom: 9px;
      box-shadow: 0 1px 1px rgba(0,0,0,.04);
    }
    .card:last-child { margin-bottom: 0; }
    .card .milestone { font-size: 10.5px; color: var(--muted); font-weight: 700; letter-spacing: .03em; }
    .card .title { font-size: 14px; font-weight: 600; margin: 2px 0 3px; }
    .card .desc { font-size: 12px; color: var(--muted); line-height: 1.4; }
    .card .meta { display: flex; align-items: center; gap: 8px; margin-top: 8px; font-size: 11.5px; }
    .pill {
      padding: 2px 8px; border-radius: 99px; font-weight: 700; font-size: 11px;
      background: var(--line); color: var(--ink);
    }
    .eta { color: var(--muted); }
    .timeleft { margin-left: auto; font-weight: 700; }
    .timeleft.ok { color: var(--progress); }
    .timeleft.overdue { color: var(--overdue); }
    .card.in-progress { border-color: var(--progress); box-shadow: 0 0 0 1px var(--progress) inset, var(--shadow); }
    .card.done .title { text-decoration: line-through; color: var(--muted); }

    .empty { color: var(--muted); font-size: 12px; text-align: center; padding: 14px 0; }
    footer { margin-top: 14px; color: var(--muted); font-size: 11.5px; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1 id="project">Build Board</h1>
      <div class="sub" id="updated"></div>
    </div>
    <div class="summary">
      <span id="summaryText">0 / 0 done</span>
      <span class="bar"><span id="progressBar"></span></span>
    </div>
  </header>

  <div class="board" id="board"></div>

  <footer>View-only board · auto-refreshes every 20s · live countdowns for in-progress tasks. Source: <code>Kanban/tasks.js</code></footer>

  <script src="tasks.js"></script>
  <script>
    const COLUMNS = [
      { key: "backlog",     label: "Backlog" },
      { key: "todo",        label: "To Do" },
      { key: "in-progress", label: "In Progress" },
      { key: "done",        label: "Done" },
    ];

    function fmtDuration(ms) {
      const sign = ms < 0 ? -1 : 1;
      let s = Math.floor(Math.abs(ms) / 1000);
      const h = Math.floor(s / 3600); s -= h * 3600;
      const m = Math.floor(s / 60); s -= m * 60;
      const parts = [];
      if (h) parts.push(h + "h");
      if (m || h) parts.push(m + "m");
      parts.push(s + "s");
      return (sign < 0 ? "-" : "") + parts.join(" ");
    }

    function timeLeftHtml(task) {
      if (task.status !== "in-progress" || !task.startedAt || !task.etaMinutes) return "";
      const endMs = new Date(task.startedAt).getTime() + task.etaMinutes * 60000;
      const remaining = endMs - Date.now();
      if (remaining >= 0) {
        return `<span class="timeleft ok">${fmtDuration(remaining)} left</span>`;
      }
      return `<span class="timeleft overdue">overdue ${fmtDuration(remaining).replace("-", "")}</span>`;
    }

    function card(task) {
      const etaTxt = task.etaMinutes ? `ETA ${task.etaMinutes}m` : "";
      return `
        <div class="card ${task.status}">
          <div class="milestone">${task.milestone || ""}</div>
          <div class="title">${task.title}</div>
          <div class="desc">${task.description || ""}</div>
          <div class="meta">
            <span class="eta">${etaTxt}</span>
            ${timeLeftHtml(task)}
          </div>
        </div>`;
    }

    function render() {
      const tasks = window.KANBAN_TASKS || [];
      const meta = window.KANBAN_META || {};
      document.getElementById("project").textContent = meta.project || "Build Board";
      if (meta.updatedAt) {
        document.getElementById("updated").textContent =
          "tasks.js updated " + new Date(meta.updatedAt).toLocaleString();
      }

      const board = document.getElementById("board");
      board.innerHTML = COLUMNS.map(col => {
        const items = tasks.filter(t => t.status === col.key);
        const body = items.length
          ? items.map(card).join("")
          : `<div class="empty">— none —</div>`;
        return `
          <section class="col" data-col="${col.key}">
            <h2><span class="dot"></span>${col.label}<span class="count">${items.length}</span></h2>
            ${body}
          </section>`;
      }).join("");

      const total = tasks.length;
      const done = tasks.filter(t => t.status === "done").length;
      document.getElementById("summaryText").textContent = `${done} / ${total} done`;
      document.getElementById("progressBar").style.width =
        total ? `${Math.round((done / total) * 100)}%` : "0%";
    }

    // Live countdowns tick every second; full reload picks up tasks.js edits.
    render();
    setInterval(render, 1000);
    setTimeout(() => location.reload(), 20000);
  </script>
</body>
</html>
